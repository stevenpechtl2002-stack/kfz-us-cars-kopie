<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 60" width="160" height="60">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111111"/>
      <stop offset="100%" style="stop-color:#1c1c1c"/>
    </linearGradient>
    <filter id="glow">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#C8102E" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="160" height="60" rx="5" fill="url(#bg)"/>

  <!-- Red left bar -->
  <rect x="0" y="0" width="5" height="60" rx="3" fill="#C8102E"/>

  <!-- Top red line -->
  <rect x="5" y="0" width="155" height="3" fill="#C8102E" opacity="0.7"/>

  <!-- A.V.T. text -->
  <text
    x="83"
    y="42"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="36"
    font-weight="bold"
    fill="#FFFFFF"
    letter-spacing="4"
    filter="url(#glow)">A.V.T.</text>

  <!-- Bottom red line -->
  <rect x="5" y="57" width="155" height="3" fill="#C8102E" opacity="0.5"/>
</svg>
