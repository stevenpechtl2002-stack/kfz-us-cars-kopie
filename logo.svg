<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111111;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C8102E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a00d24;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#C8102E" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Badge background -->
  <rect x="1" y="1" width="318" height="78" rx="6" fill="url(#bgGrad)" stroke="#C8102E" stroke-width="1.5"/>

  <!-- Red accent bar left -->
  <rect x="1" y="1" width="6" height="78" rx="3" fill="url(#redGrad)"/>

  <!-- Red stripe top -->
  <rect x="7" y="1" width="311" height="3" rx="0" fill="#C8102E" opacity="0.6"/>

  <!-- US Stars (decorative) -->
  <text x="18" y="26" font-family="Georgia, serif" font-size="9" fill="#C8102E" opacity="0.5" letter-spacing="4">★  ★  ★</text>

  <!-- A.V.T. main text -->
  <text x="18" y="58"
    font-family="'Georgia', 'Times New Roman', serif"
    font-size="42"
    font-weight="900"
    fill="#FFFFFF"
    letter-spacing="3"
    filter="url(#shadow)">A.V.T.</text>

  <!-- Divider vertical line -->
  <rect x="148" y="18" width="1.5" height="46" fill="#C8102E" opacity="0.7"/>

  <!-- AUTOSERVICE label -->
  <text x="160" y="36"
    font-family="'Arial Narrow', 'Arial', sans-serif"
    font-size="11"
    font-weight="700"
    fill="#C8102E"
    letter-spacing="4"
    text-transform="uppercase">AUTOSERVICE</text>

  <!-- US CAR'S & PARTS -->
  <text x="160" y="52"
    font-family="'Arial Narrow', 'Arial', sans-serif"
    font-size="10"
    font-weight="400"
    fill="#FFFFFF"
    opacity="0.85"
    letter-spacing="2">US CAR'S &amp; PARTS</text>

  <!-- KARLSRUHE -->
  <text x="160" y="66"
    font-family="'Arial Narrow', 'Arial', sans-serif"
    font-size="9"
    font-weight="400"
    fill="#888888"
    letter-spacing="3">KARLSRUHE</text>

  <!-- Bottom red stripe accent -->
  <rect x="7" y="74" width="311" height="4" rx="0" fill="#C8102E" opacity="0.4"/>
</svg>
